<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OSSEC Malware Analysis</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #03070f;
      --bg2:       #060d1a;
      --surface:   #080f1e;
      --border:    rgba(0,140,255,.15);
      --border-hi: rgba(0,180,255,.35);
      --cyan:      #00b4ff;
      --cyan-lo:   rgba(0,180,255,.07);
      --cyan-glow: rgba(0,180,255,.25);
      --green:     #00ffaa;
      --yellow:    #ffe033;
      --red:       #ff3355;
      --text:      #7eb8d4;
      --text-dim:  #2a4a62;
      --text-hi:   #d6eef8;
      --mono:      'Share Tech Mono', monospace;
      --sans:      'Rajdhani', sans-serif;
    }

    html, body { height: 100%; }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,100,200,.055) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,100,200,.055) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(0,180,255,.35), transparent);
      animation: scanline 7s linear infinite;
      pointer-events: none;
      z-index: 1;
    }
    @keyframes scanline {
      0%   { top: -2px; opacity: 0; }
      4%   { opacity: 1; }
      96%  { opacity: 1; }
      100% { top: 100vh; opacity: 0; }
    }

    header {
      position: sticky; top: 0; z-index: 100;
      height: 58px; padding: 0 2rem;
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(3,7,15,.93);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(8px);
    }
    header::before, header::after {
      content: '';
      position: absolute; bottom: -1px;
      width: 60px; height: 3px;
      background: var(--cyan);
    }
    header::before { left: 0; }
    header::after  { right: 0; }

    .logo {
      font-family: var(--mono);
      font-size: .8rem;
      letter-spacing: .14em;
      color: var(--text-hi);
      display: flex; align-items: center; gap: .6rem;
    }
    .logo-bracket { color: var(--cyan); font-size: 1rem; }
    .logo-sep { color: var(--text-dim); }

    .header-sys { display: flex; align-items: center; gap: 1.2rem; }
    .sys-label {
      font-family: var(--mono);
      font-size: .58rem;
      color: var(--text-dim);
      letter-spacing: .14em;
    }
    #health-bar { display: flex; gap: .75rem; align-items: center; }
    .svc-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--text-dim);
      transition: background .3s, box-shadow .3s;
      cursor: default;
    }
    .svc-dot.up    { background: var(--green);  box-shadow: 0 0 6px var(--green); }
    .svc-dot.down  { background: var(--red);    box-shadow: 0 0 6px var(--red); }
    .svc-dot.degraded { background: var(--yellow); box-shadow: 0 0 6px var(--yellow); }

    main {
      flex: 1;
      display: grid;
      grid-template-columns: 320px 1fr;
      position: relative; z-index: 2;
    }

    .panel-left {
      border-right: 1px solid var(--border);
      padding: 1.8rem 1.4rem;
      display: flex; flex-direction: column; gap: 1.8rem;
      background: rgba(6,13,26,.6);
      position: relative;
    }
    .panel-left::before {
      content: '';
      position: absolute; top: 0; left: 0;
      width: 18px; height: 18px;
      border-top: 2px solid var(--cyan);
      border-left: 2px solid var(--cyan);
    }
    .panel-left::after {
      content: '';
      position: absolute; bottom: 0; left: 0;
      width: 18px; height: 18px;
      border-bottom: 2px solid var(--cyan);
      border-left: 2px solid var(--cyan);
    }

    .section-label {
      font-family: var(--mono);
      font-size: .58rem; letter-spacing: .22em;
      color: var(--cyan); text-transform: uppercase;
      margin-bottom: .7rem;
      display: flex; align-items: center; gap: .5rem;
    }
    .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    #drop-zone {
      border: 1px solid var(--border-hi);
      border-radius: 2px;
      padding: 2rem 1rem;
      text-align: center;
      cursor: pointer;
      transition: border-color .2s, background .2s;
      position: relative;
      background: var(--cyan-lo);
    }
    #drop-zone::before {
      content: '';
      position: absolute; top: -1px; right: -1px;
      width: 10px; height: 10px;
      border-top: 2px solid var(--cyan);
      border-right: 2px solid var(--cyan);
    }
    #drop-zone::after {
      content: '';
      position: absolute; bottom: -1px; left: -1px;
      width: 10px; height: 10px;
      border-bottom: 2px solid var(--cyan);
      border-left: 2px solid var(--cyan);
    }
    #drop-zone:hover, #drop-zone.drag-over {
      border-color: var(--cyan);
      background: rgba(0,180,255,.12);
    }
    #drop-zone input { display: none; }

    .dz-icon-wrap {
      width: 36px; height: 36px;
      margin: 0 auto .8rem;
      border: 1px solid var(--border-hi);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }
    .dz-icon-wrap svg { width: 16px; height: 16px; color: var(--cyan); }

    #drop-zone p {
      font-family: var(--sans);
      font-size: .85rem; font-weight: 400;
      color: var(--text-dim); line-height: 1.7;
    }
    #drop-zone p strong {
      color: var(--text-hi); font-weight: 600; display: block;
    }
    .dz-ext {
      font-family: var(--mono); font-size: .6rem;
      color: var(--text-dim); margin-top: .5rem; letter-spacing: .08em;
    }

    #file-info {
      margin-top: .7rem; padding: .65rem .85rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 2px solid var(--cyan);
      border-radius: 1px; display: none;
    }
    #file-info .fname {
      font-family: var(--mono); font-size: .72rem;
      color: var(--cyan); word-break: break-all;
    }
    #file-info .fmeta {
      font-family: var(--mono); font-size: .62rem;
      color: var(--text-dim); margin-top: .25rem;
    }

    .options-grid { display: flex; flex-direction: column; gap: .4rem; }

    .opt-btn {
      display: flex; align-items: center; gap: .8rem;
      padding: .72rem .9rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 1px;
      cursor: pointer;
      transition: border-color .15s, background .15s;
      text-align: left; width: 100%;
      position: relative; overflow: hidden;
    }
    .opt-btn::before {
      content: '';
      position: absolute; left: 0; top: 0; bottom: 0;
      width: 2px; background: transparent;
      transition: background .15s;
    }
    .opt-btn:hover { border-color: rgba(0,180,255,.28); background: rgba(0,180,255,.04); }
    .opt-btn:hover::before { background: rgba(0,180,255,.4); }
    .opt-btn.active { border-color: rgba(0,180,255,.45); background: rgba(0,180,255,.08); }
    .opt-btn.active::before { background: var(--cyan); }
    .opt-btn.active .opt-tag { color: var(--cyan); }

    .opt-tag {
      font-family: var(--mono); font-size: .58rem;
      letter-spacing: .1em; color: var(--text-dim);
      min-width: 30px;
    }
    .opt-name {
      font-size: .9rem; font-weight: 600;
      color: var(--text-hi); margin-bottom: .08rem;
      letter-spacing: .02em;
    }
    .opt-desc {
      font-size: .7rem; color: var(--text-dim);
      line-height: 1.4; font-weight: 400;
    }

    #run-btn {
      width: 100%; padding: .88rem;
      background: transparent;
      border: 1px solid rgba(0,180,255,.45);
      border-radius: 1px;
      font-family: var(--mono); font-size: .76rem;
      letter-spacing: .2em; color: var(--cyan);
      cursor: pointer;
      transition: background .2s, box-shadow .2s;
      position: relative; overflow: hidden;
    }
    #run-btn::after {
      content: '';
      position: absolute; top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(0,180,255,.1), transparent);
      transition: left .5s;
    }
    #run-btn:hover:not(:disabled) {
      background: rgba(0,180,255,.1);
      box-shadow: 0 0 20px rgba(0,180,255,.15), inset 0 0 20px rgba(0,180,255,.04);
    }
    #run-btn:hover:not(:disabled)::after { left: 100%; }
    #run-btn:disabled { opacity: .22; cursor: not-allowed; }

    .panel-right {
      padding: 2rem; overflow-y: auto; position: relative;
    }
    .panel-right::before {
      content: '';
      position: absolute; top: 0; right: 0;
      width: 18px; height: 18px;
      border-top: 2px solid var(--cyan);
      border-right: 2px solid var(--cyan);
    }
    .panel-right::after {
      content: '';
      position: absolute; bottom: 0; right: 0;
      width: 18px; height: 18px;
      border-bottom: 2px solid var(--cyan);
      border-right: 2px solid var(--cyan);
    }

    #state-empty {
      height: 100%; min-height: 320px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 1.4rem;
    }
    .empty-hud {
      width: 80px; height: 80px;
      border: 1px solid var(--border);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      position: relative;
    }
    .empty-hud::before {
      content: '';
      position: absolute; inset: 7px;
      border: 1px solid var(--border-hi);
      border-radius: 50%;
      animation: ringRotate 10s linear infinite;
    }
    .empty-hud::after {
      content: '';
      position: absolute; inset: 16px;
      border-top: 1px solid var(--cyan);
      border-radius: 50%;
      animation: ringRotate 3.5s linear infinite reverse;
    }
    @keyframes ringRotate { to { transform: rotate(360deg); } }
    .empty-hud svg { width: 18px; height: 18px; color: var(--text-dim); }
    .big-label {
      font-family: var(--mono); font-size: .62rem;
      letter-spacing: .28em; color: var(--text-dim); text-transform: uppercase;
    }

    #state-loading {
      display: none; flex-direction: column;
      align-items: center; justify-content: center;
      height: 100%; min-height: 320px; gap: 1.6rem;
    }
    .hud-spinner {
      width: 52px; height: 52px; position: relative;
    }
    .hud-spinner::before {
      content: '';
      position: absolute; inset: 0;
      border: 1px solid var(--border);
      border-top-color: var(--cyan);
      border-radius: 50%;
      animation: spin .9s linear infinite;
    }
    .hud-spinner::after {
      content: '';
      position: absolute; inset: 9px;
      border: 1px solid transparent;
      border-bottom-color: rgba(0,180,255,.45);
      border-radius: 50%;
      animation: spin .6s linear infinite reverse;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading-msg {
      font-family: var(--mono); font-size: .68rem;
      color: var(--cyan); letter-spacing: .2em;
      animation: blink 1.1s step-end infinite;
    }
    @keyframes blink { 50% { opacity: .25; } }

    #state-result { display: none; }

    .result-header {
      display: flex; align-items: flex-start; justify-content: space-between;
      margin-bottom: 1.6rem; padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }
    .result-title {
      font-family: var(--mono); font-size: .8rem;
      color: var(--cyan); letter-spacing: .12em; margin-bottom: .3rem;
    }
    .result-subtitle { font-size: .8rem; color: var(--text-dim); font-weight: 400; }

    .badge {
      font-family: var(--mono); font-size: .58rem;
      padding: .28rem .8rem; border-radius: 1px;
      letter-spacing: .14em; border: 1px solid;
    }
    .badge-red    { border-color: rgba(255,51,85,.5);  color: var(--red);    background: rgba(255,51,85,.07);  }
    .badge-green  { border-color: rgba(0,255,170,.4);  color: var(--green);  background: rgba(0,255,170,.05);  }
    .badge-yellow { border-color: rgba(255,224,51,.4); color: var(--yellow); background: rgba(255,224,51,.05); }

    .result-section { margin-bottom: 1.6rem; }
    .rs-label {
      font-family: var(--mono); font-size: .58rem;
      letter-spacing: .2em; color: var(--cyan);
      text-transform: uppercase; margin-bottom: .6rem;
      display: flex; align-items: center; gap: .5rem;
    }
    .rs-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    .rs-box {
      background: rgba(6,13,26,.8);
      border: 1px solid var(--border);
      border-radius: 1px; padding: .9rem 1rem;
      position: relative;
    }
    .rs-box::before {
      content: '';
      position: absolute; top: 0; left: 0;
      width: 8px; height: 2px; background: var(--cyan);
    }

    .kv-row {
      display: flex; gap: 1rem;
      padding: .4rem 0;
      border-bottom: 1px solid rgba(0,100,200,.1);
      font-size: .82rem; align-items: flex-start;
    }
    .kv-row:last-child { border-bottom: none; }
    .kv-key {
      font-family: var(--mono); color: var(--text-dim);
      min-width: 140px; flex-shrink: 0;
      font-size: .66rem; letter-spacing: .04em;
    }
    .kv-val { color: var(--text-hi); word-break: break-all; font-weight: 500; }

    pre.raw-json {
      font-family: var(--mono); font-size: .68rem;
      color: var(--text); line-height: 1.8;
      white-space: pre-wrap; word-break: break-all;
      max-height: 460px; overflow-y: auto;
    }

    .error-box {
      background: rgba(255,51,85,.05);
      border: 1px solid rgba(255,51,85,.2);
      border-left: 2px solid var(--red);
      padding: .9rem 1rem;
      font-family: var(--mono); font-size: .7rem; color: var(--red);
    }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-hi); border-radius: 2px; }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <span class="logo-bracket">[</span>
    OSSEC
    <span class="logo-sep">//</span>
    MALWARE ANALYSIS
    <span class="logo-bracket">]</span>
  </div>
  <div class="header-sys">
    <span class="sys-label">SERVICES</span>
    <div id="health-bar">
      <div class="svc-dot" data-svc="dynamic"  title="dynamic_microservice"></div>
      <div class="svc-dot" data-svc="speakeasy" title="speakeasy_emulator"></div>
      <div class="svc-dot" data-svc="ai"        title="ai_analysis"></div>
      <div class="svc-dot" data-svc="pdf_png"   title="pdf_png"></div>
    </div>
  </div>
</header>

<main>
  <div class="panel-left">

    <div>
      <div class="section-label">Target File</div>
      <div id="drop-zone">
        <input type="file" id="file-input" />
        <div class="dz-icon-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <p><strong>Drop file here</strong>or click to browse</p>
        <div class="dz-ext">.exe &nbsp; .dll &nbsp; .pdf &nbsp; .ps1 &nbsp; .js</div>
      </div>
      <div id="file-info">
        <div class="fname" id="fname"></div>
        <div class="fmeta" id="fmeta"></div>
      </div>
    </div>

    <div>
      <div class="section-label">Analysis Mode</div>
      <div class="options-grid">
        <button class="opt-btn active" data-mode="dynamic">
          <span class="opt-tag">DYN</span>
          <div>
            <div class="opt-name">Dynamic Analysis</div>
            <div class="opt-desc">Behavioral execution in isolated sandbox</div>
          </div>
        </button>
        <button class="opt-btn" data-mode="speakeasy">
          <span class="opt-tag">EMU</span>
          <div>
            <div class="opt-name">Speakeasy Emulation</div>
            <div class="opt-desc">Shellcode and PE emulation engine</div>
          </div>
        </button>
        <button class="opt-btn" data-mode="ai">
          <span class="opt-tag">AI</span>
          <div>
            <div class="opt-name">AI Analysis</div>
            <div class="opt-desc">LLM classification and threat intelligence</div>
          </div>
        </button>
        <button class="opt-btn" data-mode="report">
          <span class="opt-tag">RPT</span>
          <div>
            <div class="opt-name">Generate Report</div>
            <div class="opt-desc">Export structured PDF / PNG report</div>
          </div>
        </button>

      </div>
    </div>

    <button id="run-btn" disabled>INITIATE SCAN</button>
  </div>

  <div class="panel-right">
    <div id="state-empty">
      <div class="empty-hud">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
          <circle cx="11" cy="11" r="7"/>
          <path d="M21 21l-3.5-3.5" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="big-label">Awaiting target file</div>
    </div>

    <div id="state-loading">
      <div class="hud-spinner"></div>
      <p id="loading-msg">SCANNING...</p>
    </div>

    <div id="state-result"></div>
  </div>
</main>

<script>
  const API = "http://localhost:8080";
  let selectedFile = null;
  let selectedMode = "dynamic";

  async function checkHealth() {
    try {
      const r = await fetch(`${API}/health`);
      const d = await r.json();
      document.querySelectorAll('.svc-dot').forEach(el => {
        const s = d.services[el.dataset.svc];
        el.className = `svc-dot ${s || 'down'}`;
      });
    } catch {}
  }
  checkHealth();
  setInterval(checkHealth, 15000);

  const dropZone  = document.getElementById('drop-zone');
  const fileInput = document.getElementById('file-input');

  dropZone.addEventListener('click', () => fileInput.click());
  dropZone.addEventListener('dragover',  e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', ()  => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    if (e.dataTransfer.files[0]) setFile(e.dataTransfer.files[0]);
  });
  fileInput.addEventListener('change', () => { if (fileInput.files[0]) setFile(fileInput.files[0]); });

  function setFile(f) {
    selectedFile = f;
    document.getElementById('fname').textContent = f.name;
    document.getElementById('fmeta').textContent = formatBytes(f.size) + '  |  ' + (f.type || 'unknown');
    document.getElementById('file-info').style.display = 'block';
    document.getElementById('run-btn').disabled = false;
  }

  function formatBytes(b) {
    if (b < 1024)    return b + ' B';
    if (b < 1048576) return (b / 1024).toFixed(1) + ' KB';
    return (b / 1048576).toFixed(2) + ' MB';
  }

  document.querySelectorAll('.opt-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      selectedMode = btn.dataset.mode;
    });
  });

  document.getElementById('run-btn').addEventListener('click', async () => {
    if (!selectedFile) return;
    setState('loading');
    const form = new FormData();
    form.append('file', selectedFile);
    try {
      const r    = await fetch(`${API}/analyze/${selectedMode}`, { method: 'POST', body: form });
      const data = await r.json();
      if (!r.ok) throw new Error(data.detail || 'Request failed');
      renderResult(data);
      setState('result');
    } catch (err) {
      renderError(err.message);
      setState('result');
    }
  });

  function setState(s) {
    document.getElementById('state-empty').style.display   = s === 'empty'   ? 'flex'  : 'none';
    document.getElementById('state-loading').style.display = s === 'loading' ? 'flex'  : 'none';
    document.getElementById('state-result').style.display  = s === 'result'  ? 'block' : 'none';
  }

  function renderResult(data) {
    const el      = document.getElementById('state-result');
    const service = data.service || selectedMode;
    const result  = data.result  || data;
    const verdict = detectVerdict(result);
    const badge   = verdict
      ? `<span class="badge badge-${verdict.cls}">${verdict.label}</span>`
      : `<span class="badge badge-yellow">COMPLETED</span>`;

    const body = `
        <div class="result-section">
          <div class="rs-label">Result</div>
          <div class="rs-box">${renderKV(result)}</div>
        </div>`;

    el.innerHTML = `
      <div class="result-header">
        <div>
          <div class="result-title">${service.replace(/_/g,' ').toUpperCase()}</div>
          <div class="result-subtitle">${selectedFile.name} &mdash; ${formatBytes(selectedFile.size)}</div>
        </div>
        ${badge}
      </div>
      ${body}`;
  }

  function renderKV(obj) {
    if (typeof obj !== 'object' || obj === null)
      return `<pre class="raw-json">${esc(JSON.stringify(obj, null, 2))}</pre>`;
    const entries = Object.entries(obj);
    const flat = entries.every(([, v]) => typeof v !== 'object' || v === null);
    if (flat && entries.length <= 20)
      return entries.map(([k, v]) => `
        <div class="kv-row">
          <span class="kv-key">${esc(k)}</span>
          <span class="kv-val">${esc(String(v))}</span>
        </div>`).join('');
    return `<pre class="raw-json">${esc(JSON.stringify(obj, null, 2))}</pre>`;
  }

  function detectVerdict(r) {
    const s = JSON.stringify(r).toLowerCase();
    if (/malicious|malware|threat|infected/.test(s)) return { cls: 'red',    label: 'MALICIOUS' };
    if (/suspicious|anomaly|warning/.test(s))        return { cls: 'yellow', label: 'SUSPICIOUS' };
    if (/clean|safe|benign/.test(s))                 return { cls: 'green',  label: 'CLEAN' };
    return null;
  }

  function renderError(msg) {
    document.getElementById('state-result').innerHTML = `
      <div class="result-header">
        <div class="result-title">SCAN FAILED</div>
        <span class="badge badge-red">ERROR</span>
      </div>
      <div class="error-box">${esc(msg)}</div>`;
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
</script>
</body>
</html>
